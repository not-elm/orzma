# cargo-deny configuration
# https://embarkstudios.github.io/cargo-deny/

[graph]
all-features = false
no-default-features = false

[advisories]
version = 2
db-path = "~/.cargo/advisory-db"
db-urls = ["https://github.com/rustsec/advisory-db"]
yanked = "deny"
ignore = [
    # `paste` is unmaintained but has no replacement; pulled in transitively
    # (via the bevy / cef dependency tree), not used directly by this workspace.
    "RUSTSEC-2024-0436",
    # `anyhow` Error::downcast_mut unsoundness; pulled in transitively, and this
    # workspace never calls downcast_mut on a context()-wrapped error.
    "RUSTSEC-2026-0190",
    # `ttf-parser` is unmaintained; pulled in transitively via the font/text stack.
    "RUSTSEC-2026-0192",
    # `quick-xml` 0.39 DoS advisories (quadratic duplicate-attribute check /
    # unbounded NsReader namespace allocation). Pulled in transitively via
    # plist <- cef, where it only parses LOCAL trusted plist metadata (CEF
    # framework / bundle files), never attacker-controlled XML. The fixed
    # quick-xml 0.41 is semver-incompatible with plist's `^0.39` requirement.
    # TODO: drop both once plist releases with quick-xml >= 0.41.
    "RUSTSEC-2026-0194",
    "RUSTSEC-2026-0195",
]

[licenses]
version = 2
confidence-threshold = 0.93
allow = [
    "MIT",
    "Apache-2.0",
    "Apache-2.0 WITH LLVM-exception",
    "BSD-2-Clause",
    "BSD-3-Clause",
    "ISC",
    "Unicode-3.0",
    "Unicode-DFS-2016",
    "Zlib",
    "0BSD",
    # Permissive / public-domain licenses from transitive CEF / download-cef deps.
    "MIT-0",
    "BSL-1.0",
    "CC0-1.0",
    "bzip2-1.0.6",
    "MPL-2.0",
    "CDLA-Permissive-2.0",
]

[bans]
multiple-versions = "warn"
wildcards = "deny"
allow-wildcard-paths = true
highlight = "all"
allow = []
deny = []
skip = []
skip-tree = []

[sources]
unknown-registry = "deny"
unknown-git = "deny"
allow-registry = ["https://github.com/rust-lang/crates.io-index"]
# TODO: drop once bevy_cef 0.11 (TitleChanged/WebviewTitle API) is published to crates.io.
allow-git = ["https://github.com/not-elm/bevy_cef"]
