[package]
name = "ozmux_terminal"
version.workspace = true
edition.workspace = true
license.workspace = true
readme.workspace = true
authors.workspace = true
publish.workspace = true

[features]
test-helpers = ["dep:toml", "dep:sha2"]

[[test]]
name = "vt_integration"
path = "tests/vt_integration.rs"
required-features = ["test-helpers"]

[[test]]
name = "vt_emit"
path = "tests/vt_emit.rs"
required-features = ["test-helpers"]

[[test]]
name = "vt_coalescer"
path = "tests/vt_coalescer.rs"
required-features = ["test-helpers"]

[[test]]
name = "vt_scroll"
path = "tests/vt_scroll.rs"

[[test]]
name = "frame_ring_push_invariant"
path = "tests/frame_ring_push_invariant.rs"
required-features = ["test-helpers"]

[[test]]
name = "observability_metrics"
path = "tests/observability_metrics.rs"
required-features = ["test-helpers"]

[[example]]
name = "generate_tape"
required-features = ["test-helpers"]

[[bench]]
name = "frame_encode"
harness = false

[[bench]]
name = "vt_parse_throughput"
harness = false
required-features = ["test-helpers"]

[[bench]]
name = "frame_build_delta_burst"
harness = false
required-features = ["test-helpers"]

[[bench]]
name = "bridge_to_subscribe"
harness = false
required-features = ["test-helpers"]

[[bench]]
name = "broadcast_lag_rate"
harness = false
required-features = ["test-helpers"]

[dev-dependencies]
criterion = { version = "0.5", default-features = false, features = ["cargo_bench_support", "async_tokio"] }
metrics-util = { workspace = true }
tokio = { workspace = true, features = ["test-util"] }

[dependencies]
toml = { version = "0.8", default-features = false, features = ["parse"], optional = true }
sha2 = { version = "0.10", optional = true }
serde_json = "1"
ozmux_multiplexer = { path = "../multiplexer" }
ozmux_extension = { path = "../extension" }
tokio = { workspace = true, features = ["sync", "rt-multi-thread", "macros", "time"] }
serde = { workspace = true, features = ["derive"] }
thiserror = { workspace = true }
anyhow = { workspace = true }
portable-pty = { workspace = true }
tempfile = { workspace = true }
tracing = { workspace = true }
metrics = { workspace = true }
alacritty_terminal = "0.26"
vte = "0.15"
rmp-serde = { workspace = true }
unicode-width = { workspace = true }
bytes = { workspace = true }
tokio-util = { workspace = true, features = ["rt"] }

[build-dependencies]
toml = { version = "0.8", default-features = false, features = ["parse"] }
