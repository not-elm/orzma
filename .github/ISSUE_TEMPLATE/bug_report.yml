name: Bug Report
description: Report a bug or unexpected behavior
title: "[Bug] "
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to file a bug report!
        Please search [existing issues](https://github.com/not-elm/orzma/issues?q=is%3Aissue) first to avoid duplicates.
  - type: input
    id: version
    attributes:
      label: orzma version
      description: Find it with `brew info --cask orzma`.
      placeholder: e.g. 0.1.0
    validations:
      required: true
  - type: input
    id: os
    attributes:
      label: macOS version
      description: Include the chip if relevant.
      placeholder: e.g. 14.5 (Apple Silicon)
    validations:
      required: true
  - type: dropdown
    id: mode
    attributes:
      label: Mode
      description: Which mode were you in when the bug occurred?
      options:
        - Default mode (single pane)
        - tmux integration mode (tmux -CC)
        - Not sure
    validations:
      required: true
  - type: input
    id: tmux_version
    attributes:
      label: tmux version
      description: Output of `tmux -V` (only relevant in tmux integration mode).
      placeholder: e.g. tmux 3.5a
  - type: textarea
    id: what_happened
    attributes:
      label: What happened?
      description: A clear description of the actual behavior.
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
      description: What did you expect to happen instead?
    validations:
      required: true
  - type: textarea
    id: repro
    attributes:
      label: Steps to reproduce
      description: Numbered steps that reliably reproduce the problem.
      placeholder: |
        1. ...
        2. ...
        3. ...
    validations:
      required: true
  - type: textarea
    id: logs
    attributes:
      label: Logs
      description: Run with `RUST_LOG=debug` and paste relevant log output.
      render: shell
  - type: textarea
    id: config
    attributes:
      label: Relevant configuration
      description: Relevant parts of your `~/.config/orzma/config.toml`, if any.
      render: toml
  - type: textarea
    id: context
    attributes:
      label: Additional context
      description: Screenshots, screen recordings, or any other context.
  - type: checkboxes
    id: checks
    attributes:
      label: Checks
      options:
        - label: I searched existing issues and did not find a duplicate.
          required: true
        - label: I can reproduce this on the latest version.
