[package]
name = "ozmux-gui"
version.workspace = true
edition.workspace = true
license.workspace = true
readme.workspace = true
authors.workspace = true
publish.workspace = true

[[bin]]
name = "ozmux-gui"
path = "src/main.rs"

[features]
# Dev-only diagnostics. Enables the CEF `remote-debugging-port` (a local
# Chromium DevTools/CDP endpoint on 127.0.0.1:9222) for inspecting the
# embedded webview. Off by default so the endpoint is not exposed in normal
# builds; enable with `cargo run --features debug`.
debug = []

[dependencies]
ab_glyph = "0.2"
arboard = { version = "3", features = ["wayland-data-control"] }
bevy = { workspace = true }
bevy_cef = { git = "https://github.com/not-elm/bevy_cef", branch = "passthrough", features = ["debug"] }
bevy_cef_core = { workspace = true }
ozma_tty_renderer = { path = "crates/ozma_tty_renderer" }
ozma_tty_engine = { path = "crates/ozma_tty_engine" }
cosmic-text = "0.16"
crossbeam-channel = "0.5"
data-encoding = "2"
getrandom = "0.2"
libc = "0.2"
open = { workspace = true }
ozmux_configs = { path = "crates/configs" }
ozmux_webview_host = { path = "crates/webview_host", features = ["cef"] }
ozmux_multiplexer = { path = "crates/multiplexer" }
serde = { workspace = true }
serde_json = { workspace = true }
tracing = { workspace = true }
unicode-width = { workspace = true }

[dev-dependencies]
tempfile = { workspace = true }

[lints]
workspace = true

[workspace]
resolver = "2"
members = [
  "crates/*", "sdk/ratatui-ozma",
]

[workspace.package]
version = "0.1.0"
edition = "2024"
license = "MIT"
readme = "README.md"
authors = ["notelm"]
publish = false

[workspace.dependencies]
# NOTE: default_font is load-bearing for src/font.rs::make_ui_font_handle —
# the fallback when bevy_text rejects a font (e.g., parser divergence between
# ab_glyph and cosmic-text/skrifa) uses Handle::<Font>::default() which only
# resolves to FiraMono when default_font is enabled. The feature is currently
# part of bevy's default set via 2d/3d/ui → default_platform → default_font,
# but listing it explicitly here protects against future "default-features = false".
bevy = { version = "0.18", features = ["default_font"] }
tokio = { version = "1.52" }
anyhow = { version = "1" }
thiserror = { version = "2" }
serde = { version = "1", features = ["derive"] }
serde_json = { version = "1" }
portable-pty = "0.9"
tracing = "0.1"
tempfile = "3"
toml = "0.8"
dirs = "5"
unicode-width = "0.2"
open = "5"
bevy_cef_core = { git = "https://github.com/not-elm/bevy_cef", branch = "passthrough" }

[workspace.lints.clippy]
too_many_arguments = "allow"
type_complexity = "allow"
