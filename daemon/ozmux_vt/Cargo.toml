[package]
name = "ozmux_vt"
version.workspace = true
edition.workspace = true
license.workspace = true
readme.workspace = true
authors.workspace = true
publish.workspace = true

[dependencies]
serde = { workspace = true }
alacritty_terminal = { workspace = true, optional = true }
vte = { version = "0.15", optional = true }
crossbeam-channel = { version = "0.5", optional = true }
unicode-width = { workspace = true, optional = true }
percent-encoding = { version = "2", optional = true }
gethostname = { version = "1", optional = true }
tracing = { workspace = true, optional = true }
portable-pty = { workspace = true, optional = true }
anyhow = { workspace = true, optional = true }

[features]
default = ["engine"]
engine = ["dep:alacritty_terminal", "dep:vte", "dep:crossbeam-channel", "dep:unicode-width", "dep:percent-encoding", "dep:gethostname", "dep:tracing"]
pty = ["dep:portable-pty", "dep:anyhow", "dep:crossbeam-channel"]

[dev-dependencies]
rmp-serde = "1"

[lints]
workspace = true
