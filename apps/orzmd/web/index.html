<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <link rel="stylesheet" href="bundle.css" />
    <style>
      :root { color-scheme: dark; }
      body { margin: 0; padding: 24px; background: #0d1117; color: #c9d1d9;
             font: 16px/1.6 -apple-system, system-ui, sans-serif; }
      img { max-width: 100%; height: auto; }
      pre { background: #161b22; padding: 12px; border-radius: 6px; overflow: auto; }
      code { font-family: ui-monospace, monospace; }
      mark.orzmd-match { background: #ffd33d55; color: inherit; }
      mark.orzmd-current { background: #ffd33d; color: #000; }
      .orzmd-anchor { display: inline; scroll-margin-top: 8px; }
      table { border-collapse: collapse; }
      th, td { border: 1px solid #30363d; padding: 6px 12px; }
      .markdown-alert { border-left: 4px solid var(--alert-accent);
             background: color-mix(in srgb, var(--alert-accent) 8%, transparent);
             padding: 8px 16px; margin: 16px 0; border-radius: 6px; }
      .markdown-alert > :first-child { margin-top: 0; }
      .markdown-alert > :last-child { margin-bottom: 0; }
      .markdown-alert-title { display: flex; align-items: center; gap: 8px;
             font-weight: 600; color: var(--alert-accent); }
      .markdown-alert-title svg { fill: currentColor; }
      .markdown-alert-note { --alert-accent: #58a6ff; }
      .markdown-alert-tip { --alert-accent: #3fb950; }
      .markdown-alert-important { --alert-accent: #a371f7; }
      .markdown-alert-warning { --alert-accent: #d29922; }
      .markdown-alert-caution { --alert-accent: #f85149; }
    </style>
  </head>
  <body>
    <div id="content"></div>
    <script type="module" src="bundle.js"></script>
  </body>
</html>
