[package]
name = "ozmux-gui"
version.workspace = true
edition.workspace = true
license.workspace = true
readme.workspace = true
authors.workspace = true
publish.workspace = true

[[bin]]
name = "ozmux-gui"
path = "src/main.rs"

[features]
# Dev-only diagnostics. Enables the CEF `remote-debugging-port` (a local
# Chromium DevTools/CDP endpoint on 127.0.0.1:9222) for inspecting the embedded
# extension webview. Off by default so the endpoint is not exposed in normal
# builds; enable with `cargo run --features debug`.
debug = []

[dependencies]
ab_glyph = "0.2"
arboard = { version = "3", features = ["wayland-data-control"] }
bevy = { workspace = true }
bevy_cef = { path = "/Users/watanabe/workspace/bevy_cef", features = ["debug"] }
bevy_terminal_renderer = { path = "crates/bevy_terminal_renderer" }
bevy_terminal = { path = "crates/bevy_terminal" }
cosmic-text = "0.16"
open = { workspace = true }
ozmux_configs = { path = "crates/configs" }
ozmux_extension_host = { path = "crates/extension_host", features = ["cef"] }
ozmux_multiplexer = { path = "crates/multiplexer" }
serde = { workspace = true }
serde_json = { workspace = true }
tracing = { workspace = true }
unicode-width = { workspace = true }

[lints]
workspace = true

[workspace]
resolver = "2"
members = [
  "crates/*",
]

[workspace.package]
version = "0.1.0"
edition = "2024"
license = "MIT"
readme = "README.md"
authors = ["notelm"]
publish = false

[workspace.dependencies]
# NOTE: default_font is load-bearing for src/font.rs::make_ui_font_handle —
# the fallback when bevy_text rejects a font (e.g., parser divergence between
# ab_glyph and cosmic-text/skrifa) uses Handle::<Font>::default() which only
# resolves to FiraMono when default_font is enabled. The feature is currently
# part of bevy's default set via 2d/3d/ui → default_platform → default_font,
# but listing it explicitly here protects against future "default-features = false".
bevy = { version = "0.18", features = ["default_font"] }
tokio = { version = "1.52" }
anyhow = { version = "1" }
dashmap = "6"
thiserror = { version = "2" }
serde = { version = "1", features = ["derive"] }
serde_json = { version = "1" }
interprocess = { version = "2.4", features = ["tokio", "async"] }
axum = { version = "0.8", features = ["ws"] }
portable-pty = "0.9"
uuid = { version = "1", features = ["v4"] }
tracing = "0.1"
tracing-subscriber = { version = "0.3", features = ["env-filter"] }
futures-util = { version = "0.3", default-features = false, features = [
  "sink",
] }
tempfile = "3"
mime_guess = "2.0"
libc = "0.2"
toml = "0.8"
dirs = "5"
rmp-serde = "1"
unicode-width = "0.2"
bytes = "1"
tokio-util = "0.7"
clap = { version = "4", features = ["derive"] }
reqwest = { version = "0.13", default-features = false, features = [
  "rustls",
  "json",
] }
derive_more = { version = "2" }
open = "5"

[workspace.lints.clippy]
too_many_arguments = "allow"
type_complexity = "allow"
