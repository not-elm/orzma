name: Feature Request
description: Suggest a feature or improvement
title: "[Feature] "
labels: ["enhancement"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for the suggestion!
        Please search [existing issues](https://github.com/not-elm/orzma/issues?q=is%3Aissue) first to avoid duplicates.
  - type: textarea
    id: problem
    attributes:
      label: Problem / motivation
      description: What problem would this feature solve? What are you trying to do?
    validations:
      required: true
  - type: textarea
    id: solution
    attributes:
      label: Proposed solution
      description: Describe the feature or change you'd like to see.
    validations:
      required: true
  - type: textarea
    id: context
    attributes:
      label: Additional context
      description: Any other context, mockups, or references.
  - type: checkboxes
    id: checks
    attributes:
      label: Checks
      options:
        - label: I searched existing issues and did not find a duplicate.
          required: true
