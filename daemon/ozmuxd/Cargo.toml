[package]
name = "ozmuxd"
version = "0.1.0"
edition = "2024"

[lib]
path = "src/lib.rs"

[[bin]]
name = "ozmuxd"
path = "src/main.rs"

[dependencies]
ozmux_mux = { path = "../ozmux_mux" }
ozmux_proto = { path = "../ozmux_proto" }
ozmux_vt = { path = "../ozmux_vt", features = ["pty"] }
alacritty_terminal = { workspace = true }
crossbeam-channel = "0.5"
tracing = { workspace = true }

[dev-dependencies]
ozmux_proto = { path = "../ozmux_proto" }
ozmux_mux = { path = "../ozmux_mux" }

[lints]
workspace = true
