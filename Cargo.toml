[package]
name = "ozmux-gui"
version.workspace = true
edition.workspace = true
license.workspace = true
readme.workspace = true
authors.workspace = true
publish.workspace = true

[[bin]]
name = "ozmux-gui"
path = "src/main.rs"

[features]
# Dev-only diagnostics. Enables the CEF `remote-debugging-port` (a local
# Chromium DevTools/CDP endpoint on 127.0.0.1:9222) for inspecting the embedded
# extension webview. Off by default so the endpoint is not exposed in normal
# builds; enable with `cargo run --features debug`.
debug = []
# Thin-client build: reads layout from the daemon; the local Mux and write path
# are compiled out of ozmux_multiplexer. The root binary still compiles (T6 wires
# the app systems), but main.rs is NOT yet adapted in T3 — root --features
# thin-client will fail until T6.
thin-client = ["ozmux_multiplexer/thin-client", "ozmux_extension_host/thin-client", "dep:ozmuxd", "dep:ozmux_proto"]

[dependencies]
ab_glyph = "0.2"
arboard = { version = "3", features = ["wayland-data-control"] }
bevy = { workspace = true }
bevy_cef = { git = "https://github.com/not-elm/bevy_cef", branch = "poc/macos-accelerated-paint-iosurface", features = ["debug"] }
bevy_terminal_renderer = { path = "crates/bevy_terminal_renderer" }
bevy_terminal = { path = "crates/bevy_terminal" }
cosmic-text = "0.16"
open = { workspace = true }
ozmux_configs = { path = "crates/configs" }
ozmux_extension_host = { path = "crates/extension_host", features = ["cef"] }
ozmux_multiplexer = { path = "crates/multiplexer" }
ozmuxd = { path = "daemon/ozmuxd", optional = true }
ozmux_proto = { path = "daemon/ozmux_proto", optional = true }
serde = { workspace = true }
serde_json = { workspace = true }
tracing = { workspace = true }
unicode-width = { workspace = true }

[dev-dependencies]
tempfile = { workspace = true }

[lints]
workspace = true

[workspace]
resolver = "2"
members = [
  "crates/*",
  "daemon/ozmux_vt",
  "daemon/ozmux_mux",
  "daemon/ozmux_proto",
  "daemon/ozmuxd",
]

[workspace.package]
version = "0.1.0"
edition = "2024"
license = "MIT"
readme = "README.md"
authors = ["notelm"]
publish = false

[workspace.dependencies]
# NOTE: default_font is load-bearing for src/font.rs::make_ui_font_handle —
# the fallback when bevy_text rejects a font (e.g., parser divergence between
# ab_glyph and cosmic-text/skrifa) uses Handle::<Font>::default() which only
# resolves to FiraMono when default_font is enabled. The feature is currently
# part of bevy's default set via 2d/3d/ui → default_platform → default_font,
# but listing it explicitly here protects against future "default-features = false".
bevy = { version = "0.18", features = ["default_font"] }
tokio = { version = "1.52" }
alacritty_terminal = "0.26"
anyhow = { version = "1" }
thiserror = { version = "2" }
slotmap = { version = "1", features = ["serde"] }
serde = { version = "1", features = ["derive"] }
serde_json = { version = "1" }
portable-pty = "0.9"
tracing = "0.1"
tempfile = "3"
toml = "0.8"
dirs = "5"
unicode-width = "0.2"
open = "5"
bevy_cef_core = { git = "https://github.com/not-elm/bevy_cef", branch = "poc/macos-accelerated-paint-iosurface"}

[workspace.lints.clippy]
too_many_arguments = "allow"
type_complexity = "allow"
