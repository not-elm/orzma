<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>memo</title>
    <style>
      body {
        font-family: ui-monospace, "SF Mono", Menlo, Consolas, monospace;
        margin: 0;
        padding: 1rem;
        background: #1a1b26;
        color: #c0caf5;
      }
      input, button {
        font: inherit;
        padding: 0.25rem 0.5rem;
        background: #292e42;
        color: #c0caf5;
        border: 1px solid #414868;
      }
      button[disabled] { opacity: 0.5; }
      #result, #clock { margin-top: 1rem; }
    </style>
  </head>
  <body>
    <h1>Memo</h1>
    <section>
      <p>handler RPC demo</p>
      <input id="name" type="text" placeholder="Your name" />
      <button id="send" type="button">Send</button>
      <p id="result"></p>
    </section>
    <section>
      <p>channel demo</p>
      <button id="start-clock" type="button">Start clock</button>
      <button id="stop-clock" type="button" disabled>Stop clock</button>
      <p id="clock">(idle)</p>
    </section>

    <script type="module">
      import { createClient } from "./dist/sdk.js";

      const client = createClient();
      const sendBtn = document.getElementById("send");
      const result = document.getElementById("result");
      const startBtn = document.getElementById("start-clock");
      const stopBtn = document.getElementById("stop-clock");
      const clockEl = document.getElementById("clock");

      sendBtn.addEventListener("click", async () => {
        const name = document.getElementById("name").value;
        try {
          const resp = await client.call("greet", { name });
          result.textContent = resp.message;
        } catch (e) {
          result.textContent = `error: ${e.message}`;
        }
      });

      let activeAbort = null;

      startBtn.addEventListener("click", async () => {
        if (activeAbort) return;
        const ac = new AbortController();
        activeAbort = ac;
        startBtn.disabled = true;
        stopBtn.disabled = false;
        try {
          for await (const ev of client.subscribe(
            "clock",
            { intervalMs: 1000 },
            { signal: ac.signal },
          )) {
            clockEl.textContent = ev.time;
          }
          clockEl.textContent = "(stopped)";
        } catch (e) {
          clockEl.textContent = `error: ${e.message}`;
        } finally {
          if (activeAbort === ac) activeAbort = null;
          startBtn.disabled = false;
          stopBtn.disabled = true;
        }
      });

      stopBtn.addEventListener("click", () => {
        activeAbort?.abort();
      });
    </script>
  </body>
</html>
