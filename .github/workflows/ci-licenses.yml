name: ci-licenses

on:
  push:
    branches: [main]
    paths:
      - "Cargo.toml"
      - "Cargo.lock"
      - "package.json"
      - "pnpm-workspace.yaml"
      - "pnpm-lock.yaml"
      - "about.toml"
      - "about.hbs"
      - "scripts/generate_licenses.py"
      - "justfile"
      - "licenses/**"
      - ".github/workflows/ci-licenses.yml"
  pull_request:
    paths:
      - "Cargo.toml"
      - "Cargo.lock"
      - "package.json"
      - "pnpm-workspace.yaml"
      - "pnpm-lock.yaml"
      - "about.toml"
      - "about.hbs"
      - "scripts/generate_licenses.py"
      - "justfile"
      - "licenses/**"
      - ".github/workflows/ci-licenses.yml"

permissions:
  contents: read

concurrency:
  group: ci-licenses-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:
  drift:
    name: drift
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: dtolnay/rust-toolchain@stable
      - uses: taiki-e/install-action@v2
        with:
          tool: cargo-about@0.9.0,just
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - uses: Swatinem/rust-cache@v2
        with:
          shared-key: "ci"
      - run: cargo fetch --locked
      - run: just licenses-check
