# cargo-about configuration for ozmux third-party license aggregation.
# `accepted` mirrors deny.toml [licenses].allow (keep the two in sync).
# no-clearly-defined + targets keep output deterministic across hosts.
accepted = [
    "MIT",
    "Apache-2.0",
    "Apache-2.0 WITH LLVM-exception",
    "BSD-2-Clause",
    "BSD-3-Clause",
    "ISC",
    "Unicode-3.0",
    "Unicode-DFS-2016",
    "Zlib",
    "0BSD",
    "MIT-0",
    "BSL-1.0",
    "CC0-1.0",
    "bzip2-1.0.6",
    "MPL-2.0",
    "CDLA-Permissive-2.0",
]

targets = ["aarch64-apple-darwin"]
ignore-build-dependencies = true
ignore-dev-dependencies = true
no-clearly-defined = true
filter-noassertion = true

private = { ignore = true }
