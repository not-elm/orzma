[package]
name = "ozmux-gui"
version.workspace = true
edition.workspace = true
license.workspace = true
readme.workspace = true
authors.workspace = true
publish.workspace = true

[[bin]]
name = "ozmux-gui"
path = "src/main.rs"

[dependencies]
bevy = { version = "0.18", default-features = true }
bevy_egui = "=0.39.1"
ozmux_multiplexer = { path = "daemon/multiplexer" }
tracing = { workspace = true }

[workspace]
resolver = "2"
members = [
  "daemon/configs",
  "daemon/macros",
  "daemon/multiplexer",
  "xtask",
]
exclude = [
  "cli",
  "daemon/bootstrap",
  "daemon/browser",
  "daemon/browser_cef_protocol",
  "daemon/cef_host",
  "daemon/extension",
  "daemon/http_server",
  "daemon/terminal",
  "client",
]

[workspace.package]
version = "0.1.0"
edition = "2024"
license = "MIT"
readme = "README.md"
authors = ["notelm"]
publish = false

[workspace.dependencies]
tokio = { version = "1.52" }
anyhow = { version = "1" }
dashmap = "6"
thiserror = { version = "2" }
serde = { version = "1", features = ["derive"] }
serde_json = { version = "1" }
interprocess = { version = "2.4", features = ["tokio", "async"] }
axum = { version = "0.8", features = ["ws"] }
portable-pty = "0.9"
uuid = { version = "1", features = ["v4"] }
tracing = "0.1"
tracing-subscriber = { version = "0.3", features = ["env-filter"] }
futures-util = { version = "0.3", default-features = false, features = [
  "sink",
] }
tempfile = "3"
mime_guess = "2.0"
libc = "0.2"
toml = "0.8"
dirs = "5"
rmp-serde = "1"
unicode-width = "0.2"
bytes = "1"
tokio-util = "0.7"
clap = { version = "4", features = ["derive"] }
reqwest = { version = "0.13", default-features = false, features = ["rustls", "json"] }
