[package]
name = "ozmux_extension_host"
version.workspace = true
edition.workspace = true
license.workspace = true
readme.workspace = true
authors.workspace = true
publish.workspace = true

[features]
# Pulls the bevy_cef_core path-dep + the ozmux-ext:// scheme handler.
# Off by default so the core builds/tests with std + crossbeam only.
# NOTE: this feature is a no-op until the bevy_cef_core dep links conflict
# with xtask is resolved (see the dependency comment below).
cef = []

[dependencies]
crossbeam-channel = "0.5"
libc = { workspace = true }
# NOTE: bevy_cef_core (needed for the `cef` feature) links cef-dll-sys v145
# while xtask links cef v148; both declare `links = "cef_dll_wrapper"` so
# Cargo's resolver rejects them in the same workspace. Re-add the path dep
# once the xtask cef version is aligned or this crate moves to an isolated
# workspace: { path = "/Users/watanabe/workspace/bevy_cef/crates/bevy_cef_core", optional = true }

[dev-dependencies]
tempfile = { workspace = true }
